name: Bazaar — Build, Scan and Sign

on:
  push:
    branches: [main]

jobs:
  build-scan-sign:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Docker BuildKit
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub so we can push the image
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build and push the backend image to Docker Hub
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bazaar-api:latest

      # Step 5: Run Trivy security scan on the built image
      - name: Security Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/bazaar-api:latest
          severity: CRITICAL,HIGH
          exit-code: 0

      # Step 6: Install Cosign for image signing
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Step 7: Sign the image with your private key
      - name: Sign Image with Cosign
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            ${{ secrets.DOCKERHUB_USERNAME }}/bazaar-api:latest -y
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      # Step 8: Verify the signature was applied correctly
      - name: Verify Image Signature
        run: |
          cosign verify --key cosign.pub \
            ${{ secrets.DOCKERHUB_USERNAME }}/bazaar-api:latest